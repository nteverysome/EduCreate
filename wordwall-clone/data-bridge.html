    <script>
        let currentAnalysisData = null;

        // 影片上傳處理
        const videoUploadZone = document.getElementById('videoUploadZone');
        const videoInput = document.getElementById('videoInput');

        // 拖拽上傳
        videoUploadZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            videoUploadZone.classList.add('dragover');
        });

        videoUploadZone.addEventListener('dragleave', () => {
            videoUploadZone.classList.remove('dragover');
        });

        videoUploadZone.addEventListener('drop', (e) => {
            e.preventDefault();
            videoUploadZone.classList.remove('dragover');
            const files = e.dataTransfer.files;
            if (files.length > 0 && files[0].type.startsWith('video/')) {
                handleVideoUpload(files[0]);
            }
        });

        videoInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                handleVideoUpload(e.target.files[0]);
            }
        });

        // 處理影片上傳
        function handleVideoUpload(file) {
            console.log('上傳影片:', file.name);
            
            // 模擬影片分析
            const analysisData = {
                videoInfo: {
                    name: file.name,
                    size: file.size,
                    type: file.type,
                    duration: 'unknown'
                },
                analysisResult: generateMockAnalysis(),
                timestamp: new Date().toISOString()
            };
            
            currentAnalysisData = analysisData;
            displayAnalysisData(analysisData);
            
            alert(`✅ 影片 "${file.name}" 上傳成功！\n正在進行 AI 分析...`);
        }

        // 生成模擬分析數據
        function generateMockAnalysis() {
            return {
                gameplayAnalysis: {
                    airplaneMovement: {
                        type: 'smooth_vertical',
                        speed: 'medium',
                        responsiveness: 'high',
                        physics: 'basic'
                    },
                    cloudSpawning: {
                        frequency: '2-3_seconds',
                        pattern: 'random_vertical',
                        difficulty: 'progressive'
                    },
                    collisionDetection: {
                        accuracy: 'pixel_perfect',
                        feedback: 'immediate',
                        effects: 'explosion_animation'
                    }
                },
                visualAnalysis: {
                    airplane: {
                        style: '2d_sprite',
                        animation: 'basic',
                        suggestions: ['add_3d_model', 'enhance_animation', 'add_trail_effect']
                    },
                    background: {
                        style: 'static_gradient',
                        layers: 1,
                        suggestions: ['add_parallax_scrolling', 'animated_clouds', 'dynamic_lighting']
                    },
                    explosions: {
                        style: 'simple_circle',
                        particles: false,
                        suggestions: ['particle_system', 'screen_shake', 'color_variation']
                    }
                },
                performanceAnalysis: {
                    frameRate: 'variable',
                    optimization: 'basic',
                    suggestions: ['use_requestAnimationFrame', 'object_pooling', 'efficient_collision']
                }
            };
        }

        // 粘貼分析數據
        function pasteAnalysisData() {
            navigator.clipboard.readText().then(text => {
                document.getElementById('analysisDataInput').value = text;
                parseAndSendData();
            }).catch(err => {
                alert('無法讀取剪貼板，請手動粘貼數據');
                document.getElementById('analysisDataInput').focus();
            });
        }

        // 解析並發送數據
        function parseAndSendData() {
            const inputData = document.getElementById('analysisDataInput').value.trim();
            
            if (!inputData) {
                alert('請先輸入分析數據！');
                return;
            }

            try {
                // 嘗試解析 JSON
                let parsedData;
                if (inputData.startsWith('{') || inputData.startsWith('[')) {
                    parsedData = JSON.parse(inputData);
                } else {
                    // 純文字描述
                    parsedData = {
                        type: 'text_description',
                        content: inputData,
                        timestamp: new Date().toISOString()
                    };
                }

                currentAnalysisData = parsedData;
                displayAnalysisData(parsedData);
                performAIAnalysis(parsedData);

            } catch (error) {
                // JSON 解析失敗，當作文字描述處理
                const textData = {
                    type: 'text_description',
                    content: inputData,
                    timestamp: new Date().toISOString()
                };
                
                currentAnalysisData = textData;
                displayAnalysisData(textData);
                performAIAnalysis(textData);
            }
        }

        // 顯示分析數據
        function displayAnalysisData(data) {
            document.getElementById('dataPreview').classList.remove('hidden');
            document.getElementById('parsedData').textContent = JSON.stringify(data, null, 2);
        }

        // 執行 AI 分析
        function performAIAnalysis(data) {
            document.getElementById('aiAnalysis').classList.remove('hidden');
            
            const analysisContent = document.getElementById('aiAnalysisContent');
            analysisContent.innerHTML = `
                <div class="space-y-4">
                    <div class="bg-white bg-opacity-20 rounded-lg p-4">
                        <h3 class="font-semibold mb-2">📊 數據解析結果</h3>
                        <p class="text-sm">成功解析 ${data.type === 'text_description' ? '文字描述' : 'JSON 數據'}</p>
                        <p class="text-sm">數據類型: ${typeof data}</p>
                        <p class="text-sm">處理時間: ${new Date().toLocaleString()}</p>
                    </div>
                    
                    <div class="bg-white bg-opacity-20 rounded-lg p-4">
                        <h3 class="font-semibold mb-2">🎯 改進建議</h3>
                        <ul class="list-disc list-inside space-y-1 text-sm">
                            <li>基於分析數據優化飛機移動物理</li>
                            <li>增強視覺效果和動畫流暢度</li>
                            <li>改進碰撞檢測和反饋機制</li>
                            <li>優化遊戲性能和響應速度</li>
                        </ul>
                    </div>
                    
                    <div class="bg-white bg-opacity-20 rounded-lg p-4">
                        <h3 class="font-semibold mb-2">🔧 技術實現</h3>
                        <p class="text-sm">準備生成對應的代碼改進方案...</p>
                    </div>
                </div>
            `;

            // 顯示代碼生成區域
            document.getElementById('codeGeneration').classList.remove('hidden');
        }

        // 生成代碼
        function generateCode() {
            const generatedCode = document.getElementById('generatedCode');
            generatedCode.textContent = `
// 🚀 基於分析數據的遊戲改進代碼

// 1. 增強飛機物理系統
class EnhancedAirplane {
    constructor() {
        this.position = { x: 50, y: window.innerHeight / 2 };
        this.velocity = { x: 0, y: 0 };
        this.acceleration = { x: 0, y: 0 };
        this.maxSpeed = 8;
        this.friction = 0.85;
    }
    
    update(input) {
        // 基於分析數據的物理計算
        this.acceleration.y = input.up ? -0.5 : input.down ? 0.5 : 0;
        this.velocity.y += this.acceleration.y;
        this.velocity.y = Math.max(-this.maxSpeed, Math.min(this.maxSpeed, this.velocity.y));
        this.velocity.y *= this.friction;
        this.position.y += this.velocity.y;
        this.position.y = Math.max(50, Math.min(window.innerHeight - 100, this.position.y));
    }
}

// 2. 粒子爆炸系統
class ParticleExplosion {
    constructor(x, y, color) {
        this.particles = [];
        this.createParticles(x, y, color);
    }
    
    createParticles(x, y, color) {
        for (let i = 0; i < 20; i++) {
            this.particles.push({
                x: x, y: y,
                vx: (Math.random() - 0.5) * 10,
                vy: (Math.random() - 0.5) * 10,
                life: 1.0,
                decay: Math.random() * 0.02 + 0.02,
                color: color
            });
        }
    }
}

// 3. 性能優化渲染
class OptimizedRenderer {
    constructor() {
        this.lastTime = 0;
        this.fps = 0;
    }
    
    render(currentTime) {
        const deltaTime = currentTime - this.lastTime;
        this.lastTime = currentTime;
        
        // 基於分析數據的優化渲染
        this.clearCanvas();
        this.renderBackground();
        this.renderGameObjects();
        this.renderEffects();
        
        requestAnimationFrame(this.render.bind(this));
    }
}

console.log('✅ 代碼生成完成！基於您的分析數據。');
            `;
        }

            document.getElementById('analysisDataInput').value = '';

        // 連接分析器
        function connectToAnalyzer() {
            window.open('video-upload-analyzer.html', '_blank');
        }

        // 真正的 pick_video 功能實現
        function pickVideo() {
            return new Promise((resolve, reject) => {
                // 創建文件輸入元素
                const input = document.createElement('input');
                input.type = 'file';
                input.accept = 'video/mp4,video/avi,video/mov,video/wmv,video/webm,video/mkv,video/flv,.mp4,.avi,.mov,.wmv,.webm,.mkv,.flv';
                input.style.display = 'none';

                input.onchange = function(event) {
                    const file = event.target.files[0];
                    if (!file) {
                        reject(new Error('未選擇文件'));
                        return;
                    }

                    // 檢查文件大小（100MB限制）
                    const maxSize = 100 * 1024 * 1024; // 100MB
                    if (file.size > maxSize) {
                        alert(`文件過大: ${(file.size / 1024 / 1024).toFixed(1)} MB\n最大支持: 100 MB`);
                        reject(new Error('文件過大'));
                        return;
                    }

                    // 檢查文件類型
                    const supportedTypes = ['video/mp4', 'video/avi', 'video/quicktime', 'video/x-msvideo', 'video/webm', 'video/x-matroska'];
                    const supportedExtensions = ['.mp4', '.avi', '.mov', '.wmv', '.webm', '.mkv', '.flv'];

                    const fileExtension = '.' + file.name.split('.').pop().toLowerCase();
                    const isValidType = supportedTypes.includes(file.type) || supportedExtensions.includes(fileExtension);

                    if (!isValidType) {
                        alert(`不支持的文件格式: ${fileExtension}\n支持的格式: MP4, AVI, MOV, WMV, WebM, MKV, FLV`);
                        reject(new Error('不支持的文件格式'));
                        return;
                    }

                    // 構建文件信息
                    const videoInfo = {
                        name: file.name,
                        size: file.size,
                        size_mb: (file.size / 1024 / 1024).toFixed(1),
                        type: file.type || 'video/' + fileExtension.substring(1),
                        lastModified: new Date(file.lastModified).toISOString(),
                        file: file // 保存文件對象以便後續處理
                    };

                    resolve(videoInfo);
                };

                input.onerror = function() {
                    reject(new Error('文件選擇失敗'));
                };

                // 觸發文件選擇
                document.body.appendChild(input);
                input.click();
                document.body.removeChild(input);
            });
        }

        // 使用 pick_video 功能
        async function useMCPPickVideo() {
            try {
                // 顯示加載狀態
                const button = event.target;
                const originalText = button.textContent;
                button.textContent = '🎬 選擇影片中...';
                button.disabled = true;

                const videoInfo = await pickVideo();

                // 構建分析數據
                const analysisData = {
                    type: 'pick_video_result',
                    action: 'video_selected',
                    video_info: {
                        name: videoInfo.name,
                        size: videoInfo.size,
                        size_mb: videoInfo.size_mb,
                        type: videoInfo.type,
                        lastModified: videoInfo.lastModified
                    },
                    analysis_suggestions: [
                        '基於影片內容分析遊戲機制',
                        '識別飛機移動模式和速度',
                        '分析視覺效果和動畫風格',

                // 將數據填入輸入框

            } catch (error) {
                console.error('pick_video 失敗:', error);
                alert(`❌ 影片選擇失敗: ${error.message}`);

                // 恢復按鈕狀態
                const button = event.target;
                button.textContent = '🎬 使用 MCP pick_video';
                button.disabled = false;
            }
        }

        // 導出數據
        function exportData() {
            if (!currentAnalysisData) {
                alert('沒有數據可導出！');
                return;
            }
            
            const dataStr = JSON.stringify(currentAnalysisData, null, 2);
            const dataBlob = new Blob([dataStr], {type: 'application/json'});
            const url = URL.createObjectURL(dataBlob);
            const link = document.createElement('a');
            link.href = url;
            link.download = 'analysis-data.json';
            link.click();
            URL.revokeObjectURL(url);
        }
    </script>
</body>
</html>
