version: '3.8'

services:
  # PostgreSQL 數據庫
  postgres:
    image: postgres:15-alpine
    container_name: wordwall-postgres
    environment:
      POSTGRES_DB: wordwall_clone
      POSTGRES_USER: wordwall_user
      POSTGRES_PASSWORD: wordwall_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/prisma/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - wordwall-network
    restart: unless-stopped

  # Redis 緩存
  redis:
    image: redis:7-alpine
    container_name: wordwall-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - wordwall-network
    restart: unless-stopped
    command: redis-server --appendonly yes

  # 後端 API 服務
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: wordwall-backend
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://wordwall_user:wordwall_password@postgres:5432/wordwall_clone
      REDIS_URL: redis://redis:6379
      JWT_SECRET: your-super-secret-jwt-key-change-in-production
      CLOUDINARY_CLOUD_NAME: your-cloudinary-cloud-name
      CLOUDINARY_API_KEY: your-cloudinary-api-key
      CLOUDINARY_API_SECRET: your-cloudinary-api-secret
    ports:
      - "5000:5000"
    depends_on:
      - postgres
      - redis
    volumes:
      - ./backend:/app
      - /app/node_modules
    networks:
      - wordwall-network
    restart: unless-stopped
    command: npm run dev

  # 前端應用
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: wordwall-frontend
    environment:
      VITE_API_BASE_URL: http://localhost:5000/api/v1
      VITE_WS_URL: ws://localhost:5000
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - wordwall-network
    restart: unless-stopped
    command: npm run dev

  # Nginx 反向代理 (生產環境)
  nginx:
    image: nginx:alpine
    container_name: wordwall-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/ssl:/etc/nginx/ssl
    depends_on:
      - frontend
      - backend
    networks:
      - wordwall-network
    restart: unless-stopped
    profiles:
      - production

  # 數據庫管理工具 (開發環境)
  adminer:
    image: adminer:latest
    container_name: wordwall-adminer
    ports:
      - "8080:8080"
    depends_on:
      - postgres
    networks:
      - wordwall-network
    restart: unless-stopped
    profiles:
      - development

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  wordwall-network:
    driver: bridge
